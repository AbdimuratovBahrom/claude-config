<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">

    <!-- Панель тем -->
    <div class="theme-bar">
      <button class="theme-btn" data-theme="dark" title="Тёмная">🌙</button>
      <button class="theme-btn" data-theme="light" title="Светлая">☀️</button>
      <button class="theme-btn" data-theme="purple" title="Фиолетовая">💜</button>
      <button class="theme-btn" data-theme="green" title="Зелёная">💚</button>
      <button class="mode-toggle" id="modeToggle">Научный</button>
    </div>

    <!-- Дисплей -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- История вычислений -->
    <div class="history-panel" id="historyPanel">
      <div class="history-header">
        <span>История</span>
        <button onclick="clearHistory()">Очистить</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
    <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">
      История ▾
    </button>

    <!-- Научные кнопки -->
    <div class="buttons-scientific" id="scientificButtons">
      <button class="btn btn-sci" onclick="sciOp('sin')">sin</button>
      <button class="btn btn-sci" onclick="sciOp('cos')">cos</button>
      <button class="btn btn-sci" onclick="sciOp('tan')">tan</button>
      <button class="btn btn-sci" onclick="sciOp('log')">log</button>
      <button class="btn btn-sci" onclick="sciOp('ln')">ln</button>
      <button class="btn btn-sci" onclick="sciOp('sqrt')">√</button>
      <button class="btn btn-sci" onclick="sciOp('sq')">x²</button>
      <button class="btn btn-sci" onclick="sciOp('inv')">1/x</button>
      <button class="btn btn-sci" onclick="inputNum('3.14159265')">π</button>
      <button class="btn btn-sci" onclick="inputNum('2.71828182')">e</button>
    </div>

    <!-- Основные кнопки -->
    <div class="buttons">
      <button class="btn btn-wide btn-secondary" onclick="clearAll()">AC</button>
      <button class="btn btn-secondary" onclick="toggleSign()">+/-</button>
      <button class="btn btn-secondary" onclick="percent()">%</button>
      <button class="btn btn-operator" onclick="inputOp('/')">÷</button>

      <button class="btn" onclick="inputNum('7')">7</button>
      <button class="btn" onclick="inputNum('8')">8</button>
      <button class="btn" onclick="inputNum('9')">9</button>
      <button class="btn btn-operator" onclick="inputOp('*')">×</button>

      <button class="btn" onclick="inputNum('4')">4</button>
      <button class="btn" onclick="inputNum('5')">5</button>
      <button class="btn" onclick="inputNum('6')">6</button>
      <button class="btn btn-operator" onclick="inputOp('-')">−</button>

      <button class="btn" onclick="inputNum('1')">1</button>
      <button class="btn" onclick="inputNum('2')">2</button>
      <button class="btn" onclick="inputNum('3')">3</button>
      <button class="btn btn-operator" onclick="inputOp('+')">+</button>

      <button class="btn btn-wide" onclick="inputNum('0')">0</button>
      <button class="btn" onclick="inputDot()">.</button>
      <button class="btn btn-equals" onclick="calculate()">=</button>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
